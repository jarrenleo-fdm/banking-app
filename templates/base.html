<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Banking App{% endblock %}</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
  <header class="site-header">
    <nav class="nav">
      <a class="brand" href="{% url 'banking:dashboard' %}">Banking App</a>
      <div class="nav-links">
        {% if user.is_authenticated %}
          <a href="{% url 'banking:dashboard' %}">Dashboard</a>
          <a href="{% url 'banking:transactions' %}">Transactions</a>
          <form method="post" action="{% url 'accounts:logout' %}" class="inline-form">
            {% csrf_token %}
            <button type="submit">Logout</button>
          </form>
        {% else %}
          <a href="{% url 'accounts:login' %}">Login</a>
          <a href="{% url 'accounts:signup' %}">Sign up</a>
        {% endif %}
      </div>
    </nav>
  </header>
  <main class="content">
    {% if messages %}
      <div class="messages">
        {% for message in messages %}
          <p class="message {{ message.tags }}">{{ message }}</p>
        {% endfor %}
      </div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
