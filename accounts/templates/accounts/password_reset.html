{% extends "base_auth.html" %}
{% block title %}Reset password{% endblock %}
{% block content %}
  <div class="auth-card">
    <h1>Reset password</h1>
    <p style="margin-bottom:4px">Enter your email and we'll send a reset link.</p>
    <form method="post" style="margin-top:8px">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" style="width:100%;margin-top:16px">Send reset link</button>
    </form>
  </div>
  <p class="auth-footer"><a href="{% url 'accounts:login' %}">Back to login</a></p>
{% endblock %}
